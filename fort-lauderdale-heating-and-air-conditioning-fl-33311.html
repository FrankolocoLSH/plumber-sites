<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fort Lauderdale Heating And Air Conditioning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne+MT:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a2744;
            --accent: #e8651a;
            --bg: #fff;
            --light: #f4f7fb;
        }
        body {
            font-family: DM Sans, sans-serif;
            margin: 0;
            padding: 0;
        }
        @keyframes navAnimation {
            0% {
                opacity: 0;
                transform: translateY(-10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0px);
            }
        }
        .sticky-nav {
            position: sticky;
            top: 0;
            background-color: var(--primary);
            color: var(--light);
            padding: 1rem;
            transition: opacity 0.3s, transform 0.3s;
        }
        .sticky-nav .nav-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sticky-nav .nav-links ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .sticky-nav .nav-links li {
            display: inline-block;
            margin-right: 20px;
        }
        .sticky-nav .nav-links li a {
            text-decoration: none;
            color: var(--light);
            transition: color 0.3s;
        }
        .sticky-nav .nav-links li a:hover {
            color: var(--accent);
        }
        .hamburger {
            display: none;
            background-color: var(--primary);
            height: 25px;
            width: 25px;
            border-radius: 50%;
            transition: all 0.3s;
        }
        .hamburger:hover {
            background-color: var(--accent);
        }
        .hero {
            height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1521791136064-7986c2920216?w=1920&h=1080&fit=crop');
            background-size: cover;
            background-blend-mode: multiply;
            background-color: var(--primary);
            color: var(--light);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }
        .hero h1 {
            margin-bottom: 0;
        }
        .hero .cta {
            background-color: var(--light);
            color: var(--primary);
            border: none;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }
        .hero .cta:hover {
            background-color: var(--primary);
            color: var(--light);
        }
        .trust-badges {
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .trust-badge {
            width: 50px;
            height: 50px;
            background-color: #fff;
            border: 2px solid var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        .service-card {
            background-color: var(--bg);
            padding: 2rem;
            border: 1px solid var(--primary);
            border-radius: 10px;
            margin-bottom: 1rem;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        .service-card h2 {
            margin-top: 0;
        }
        .service-card .cta {
            background-color: var(--light);
            color: var(--primary);
            border: none;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }
        .service-card .cta:hover {
            background-color: var(--primary);
            color: var(--light);
        }
        .why-us {
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .block {
            width: 25%;
            background-color: var(--bg);
            padding: 2rem;
            border: 1px solid var(--primary);
            border-radius: 10px;
            margin-bottom: 1rem;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .block h3 {
            margin-top: 0;
        }
        .block img {
            width: 50px;
            height: 50px;
            margin-bottom: 1rem;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-gap: 1rem;
            padding: 1rem;
        }
        .gallery img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        .review {
            padding: 1rem;
            border: 1px solid var(--primary);
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        .review svg {
            fill: #fff;
            width: 20px;
        }
        .rating {
            margin-bottom: 0;
        }
        .about {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .about img {
            width: 100px;
            height: 100px;
            margin-right: 2rem;
            border-radius: 50%;
            object-fit: cover;
        }
        .about-content {
            margin-left: 2rem;
        }
        .stat {
            background-color: var(--bg);
            padding: 1rem;
            border: 1px solid var(--primary);
            border-radius: 10px;
            margin-bottom: 1rem;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        .contact {
            padding: 1rem;
            background-color: var(--bg);
            border: 1px solid var(--primary);
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        .contact .cta {
            background-color: var(--light);
            color: var(--primary);
            border: none;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }
        .contact .cta:hover {
            background-color: var(--primary);
            color: var(--light);
        }
        .footer {
            padding: 1rem;
            background-color: var(--bg);
            border: 1px solid var(--primary);
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .footer .social {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .footer .social img {
            width: 20px;
            height: 20px;
            margin-right: 1rem;
            object-fit: cover;
            border-radius: 50%;
        }
    </style>
</head>

                        <rect width="100" height="20" rx="5" fill="#fff" transform="translate(25,40)"></rect>
                        <rect width="100" height="20" rx="5" fill="#fff" transform="translate(25,80)"></rect>

        </div>
    </nav>
